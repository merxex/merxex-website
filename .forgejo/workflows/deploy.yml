name: Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  S3_BUCKET: merxex-static-site-prod

jobs:
  deploy:
    name: Deploy to S3/CloudFront
    runs-on: home-workstation
    steps:
      - uses: actions/checkout@v4

      - name: Install AWS CLI (if not present)
        run: |
          if ! command -v aws &>/dev/null; then
            curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
            unzip -q /tmp/awscliv2.zip -d /tmp/
            sudo /tmp/aws/install
            rm -rf /tmp/aws /tmp/awscliv2.zip
          fi
          aws --version

      - name: Configure AWS credentials
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          aws configure set aws_access_key_id "$AWS_ACCESS_KEY_ID"
          aws configure set aws_secret_access_key "$AWS_SECRET_ACCESS_KEY"
          aws configure set region "${{ env.AWS_REGION }}"

      - name: Sync to S3
        run: |
          aws s3 sync . s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".forgejo/*" \
            --exclude "*.md" \
            --cache-control "max-age=86400" \
            --region ${{ env.AWS_REGION }}

          # HTML should not be cached (immediate updates)
          find . -maxdepth 3 -name "*.html" ! -path './.git/*' ! -path './.forgejo/*' | while read f; do
            aws s3 cp "$f" "s3://${{ env.S3_BUCKET }}/${f#./}" \
              --cache-control "no-cache, no-store, must-revalidate" \
              --content-type "text/html" \
              --region ${{ env.AWS_REGION }}
          done

      - name: Invalidate CloudFront cache
        env:
          CLOUDFRONT_DIST_ID: ${{ secrets.CLOUDFRONT_DIST_ID_PROD }}
        run: |
          if [ -n "$CLOUDFRONT_DIST_ID" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$CLOUDFRONT_DIST_ID" \
              --paths "/*"
            echo "CloudFront cache invalidated"
          else
            echo "No CLOUDFRONT_DIST_ID_PROD secret set — skipping invalidation"
          fi

      - name: Notify success
        if: success()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="✅ merxex-website (${{ github.ref_name }}) deployed to S3/CloudFront." \
            -d parse_mode="HTML" || true

      - name: Notify failure
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="❌ merxex-website deploy FAILED. Ref: ${{ github.ref_name }}" \
            -d parse_mode="HTML" || true
