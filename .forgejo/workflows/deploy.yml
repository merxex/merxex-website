name: Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  S3_BUCKET: merxex-static-site-prod

jobs:
  deploy:
    name: Deploy to S3/CloudFront
    runs-on: home-workstation
    steps:
      - uses: actions/checkout@v4

      - name: Sync to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          aws s3 sync . s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".forgejo/*" \
            --exclude "*.md" \
            --cache-control "max-age=86400"
          find . -name "*.html" ! -path './.git/*' ! -path './.forgejo/*' ! -path './.github/*' | while read f; do
            aws s3 cp "$f" "s3://${{ env.S3_BUCKET }}/${f#./}" \
              --cache-control "no-cache, no-store, must-revalidate" \
              --content-type "text/html"
          done

      - name: Invalidate CloudFront cache
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          CLOUDFRONT_DIST_ID: ${{ secrets.CLOUDFRONT_DIST_ID_PROD }}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          timeout 30 aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DIST_ID" \
            --paths "/*" || true
          echo "CloudFront invalidation submitted"

      - name: Notify success
        if: success()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="merxex-website ${{ github.ref_name }} deployed to S3/CloudFront." \
            -d parse_mode="HTML" || true

      - name: Notify failure
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="merxex-website deploy FAILED. Ref: ${{ github.ref_name }}" \
            -d parse_mode="HTML" || true
